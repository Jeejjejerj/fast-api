services:
  # 1. FastAPI ilovamiz
  - type: web
    name: fastapi-24-7-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-postgres-db
          property: connectionString

databases:
  # 2. PostgreSQL ma'lumotlar bazamiz
  - name: my-postgres-db
    plan: free